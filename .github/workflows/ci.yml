# Gate de qualidade: mesmo fluxo recomendado entre sprints (validar → testar → seguir).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Linux dependencies (Tauri / WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf build-essential curl wget file

      - name: Install npm dependencies
        run: npm ci

      - name: Frontend build (TypeScript + Vite)
        run: npm run build

      - name: Install Chromium deps (Puppeteer)
        run: |
          sudo apt-get install -y \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 \
            libatk1.0-0 libcairo2 libcups2 libdbus-1-3 libdrm2 libgbm1 \
            libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 \
            libx11-6 libxcb1 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
            libxkbcommon0 libxrandr2 xdg-utils

      - name: E2E Puppeteer (web shell, settings, input)
        run: npm run test:e2e:run

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # Pacotes (.deb / AppImage): executar localmente ou num job de release quando for publicar.
      # npm run tauri build
